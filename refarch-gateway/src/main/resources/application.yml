spring:
  application:
    name: "@project.artifactId@"
    group: "@project.groupId@"
    version: "@project.version@"
  main:
    web-application-type: reactive
    banner-mode: console
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOriginPatterns: ${ALLOWED_ORIGINS_ALL:}
                allowedHeaders: ${ALLOWED_HEADERS_ALL:}
                allowCredentials: ${ALLOW_CREDENTIALS_ALL:false}
                allowedMethods: ${ALLOWED_METHODS_ALL:GET}
              '[/public/**]':
                allowedOriginPatterns: ${ALLOWED_ORIGINS_PUBLIC:${ALLOWED_ORIGINS_ALL:}}
                allowedHeaders: ${ALLOWED_HEADERS_PUBLIC:${ALLOWED_HEADERS_ALL:}}
                allowCredentials: ${ALLOW_CREDENTIALS_PUBLIC:${ALLOW_CREDENTIALS_ALL:false}}
                allowedMethods: ${ALLOWED_METHODS_PUBLIC:${ALLOWED_METHODS_ALL:GET}}
              '[/clients/**]':
                allowedOriginPatterns: ${ALLOWED_ORIGINS_CLIENTS:${ALLOWED_ORIGINS_ALL:}}
                allowedHeaders: ${ALLOWED_HEADERS_CLIENTS:${ALLOWED_HEADERS_ALL:}}
                allowCredentials: ${ALLOW_CREDENTIALS_CLIENTS:${ALLOW_CREDENTIALS_ALL:false}}
                allowedMethods: ${ALLOWED_METHODS_CLIENTS:${ALLOWED_METHODS_ALL:GET}}
          default-filters:
            - RemoveRequestHeader=cookie
            - RemoveRequestHeader=x-xsrf-token
            - TokenRelay=
  reactor:
    context-propagation: auto
  web:
    error:
      include-message: always
      whitelabel:
        enabled: false

management:
  endpoints:
    access:
      default: none
    web:
      exposure:
        include:
          - health
          - info
          - prometheus
          - sbom
      path-mapping:
        prometheus: metrics
  endpoint:
    health:
      access: read_only
    info:
      access: read_only
    prometheus:
      access: read_only
    sbom:
      access: read_only
  info:
    env:
      enabled: true
  otlp:
    metrics:
      export:
        enabled: false

logging:
  level:
    root: info
  structured:
    format:
      console: logstash
    json:
      stacktrace:
        root: first
        # default max size of one log line in docker is 16kb - UTF8 ~ 1 Character = 1 Byte
        # therefore limit stack traces to a maximum of 8192 characters (to leave room for the rest of the message)
        max-length: 8192
      add:
        application_name: ${spring.application.name}
        application_group: ${spring.application.group}

info:
  application:
    name: ${spring.application.name}
    version: ${spring.application.version}
    group: ${spring.application.group}
    description: "@project.description@"
  build:
    java.version: "@java.version@"
    spring-cloud.version: "@spring-cloud-dependencies.version@"

config:
  map5xxto400: true
