name: retag-image
description: "Retaggs an existing docker image"

inputs:
  registry:
    description: "Image registry to push image to"
    required: true
    default: ghcr.io
  registry-username:
    description: "Username to authenticate against image registry"
    required: true
  registry-password:
    description: "Password to authenticate against image registry"
    required: true
  image-name:
    description: "Name of the image"
    required: true
  existing-tag:
    description: 'Existing tag'
    required: true
  new-tag:
    description: 'New tag'
    required: true

runs:
  using: "composite"
  steps:
    - name: Login to Registry
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.registry-username }}
        password: ${{ inputs.registry-password }}
    - shell: bash
      env:
        SOURCE_IMAGE: docker://${{ inputs.registry }}/${{ github.repository }}/${{ inputs.image-name }}:${{ inputs.existing-tag }}
        TARGET_IMAGE: docker://${{ inputs.registry }}/${{ github.repository }}/${{ inputs.image-name }}:${{ inputs.new-tag }}
      run: |
        skopeo copy -- "$SOURCE_IMAGE" "$TARGET_IMAGE"
